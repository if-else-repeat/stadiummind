name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        working-directory: backend
        run: |
          pip install -r requirements.txt
          pip install flake8

      - name: Lint
        working-directory: backend
        run: flake8 --max-line-length=100 --extend-ignore=E501 app.py services/ tests/

      - name: Run tests
        working-directory: backend
        run: python -m pytest tests/ -v
